name: Deploy MERN App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mern-app:latest

      - name: Deploy to CloudStack VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }} # স্ক্রিনশটের সেই প্রাইভেট কি
          port: 8899
          script: |
            # ডকার হাবে লগইন করা (ইমেজ পুল করার জন্য)
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # লেটেস্ট ইমেজটি নামানো
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mern-app:latest
            
            # আগের কোনো কন্টেইনার থাকলে তা বন্ধ ও রিমুভ করা
            docker stop mern-app || true
            docker rm mern-app || true
            
            # নতুন কন্টেইনার রান করা
            # --network="host" ব্যবহার করা হয়েছে যাতে লোকালহোস্টের ডাটাবেস পায়
            docker run -d \
              --name mern-app \
              --network="host" \
              --restart always \
              -e PORT=5000 \
              -e MONGO_URI="${{ secrets.MONGO_URI }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e NODE_ENV=production \
              ${{ secrets.DOCKERHUB_USERNAME }}/mern-app:latest
            
            # অপ্রয়োজনীয় ইমেজ ডিলিট করে জায়গা খালি করা
            docker image prune -f