version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clickpick_app
    ports:
      - "8080:5000"  # Ekhane 5000:5000 er jaygay 8080:5000 din
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/digicart
    depends_on:
      - mongodb
    restart: unless-stopped


  mongodb:
    image: mongo:7
    container_name: clickpick_mongodb
    # MongoDB-r port 27017 baire expose na korleo cholbe (Security-r jonno)
    # ports:
    #   - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped


  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: clickpick_mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"

volumes:
  mongo_data: