version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clickpick_app
    ports:
      - "8080:5000"  # Ekhane 5000:5000 er jaygay 8080:5000 din
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://admin:admin1234@mongodb:27017/digicart?authSource=admin
      - ADMIN_NAME=Admin User
      - ADMIN_EMAIL=admin@clickandpick.com
      - ADMIN_PASSWORD=admin1234
    depends_on:
      - mongodb
    restart: unless-stopped



  mongodb:
    image: mongo:7
    container_name: clickpick_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin1234
      MONGO_INITDB_DATABASE: digicart
    # MongoDB-r port 27017 baire expose na korleo cholbe (Security-r jonno)
    # ports:
    #   - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped



  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: clickpick_mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin1234
      ME_CONFIG_MONGODB_AUTH_DATABASE: admin
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin1234@clickpick_mongodb:27017/admin

volumes:
  mongo_data: